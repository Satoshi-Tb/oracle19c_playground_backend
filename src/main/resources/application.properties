spring.application.name=DBPerfSample

# データベース接続設定
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/ORAPDB1}
spring.datasource.username=${DB_USERNAME:PDBUSER}
spring.datasource.password=${DB_PASSWORD:oracle}
spring.datasource.driver-class-name=${DB_DRIVER:oracle.jdbc.OracleDriver}

# MyBatis設定
mybatis.mapper-locations=classpath*:mapper/**/*.xml
# TypeHandlerを全体適用する場合は以下を有効化する。
# 現在はLobMapper.xmlでOracleClobStringTypeHandlerを局所指定している。
# mybatis.type-handlers-package=com.example.dbperf.typehandler

# JPA設定
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
