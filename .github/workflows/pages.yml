name: Deploy docs/html to Pages

on:
  push:
    branches: [main]
    paths: ["docs/html/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # github-pages environment は Pages 初回デプロイ時に GitHub が自動生成する
    # 有効化前は IDE の linter が未定義環境として警告するが、動作に影響はない
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Actions をコミット SHA で固定している理由:
      # タグ (v4 など) は後からコミットの指し先が変わる可能性があり、
      # pages: write / id-token: write のような強い権限を持つジョブでは
      # 意図しないコードが実行されるサプライチェーンリスクがある。
      # SHA 固定により、参照するコードが変わらないことを保証する。
      # バージョンアップは dependabot が月次で PR を作成する。
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/html
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
