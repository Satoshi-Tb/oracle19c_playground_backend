    <style>
      :root {
        --bg: #f6f8fb;
        --surface: #ffffff;
        --surface-2: #f1f4f9;
        --border: #e2e8f0;
        --text: #1e293b;
        --text-dim: #64748b;
        --accent: #2563eb;

      }
      @media (prefers-color-scheme: dark) {

          --bg: #0f172a;
          --surface: #1e293b;
          --surface-2: #273449;
          --border: #334155;
          --text: #e2e8f0;
          --text-dim: #94a3b8;
          --accent: #60a5fa;
          --accent-dim: rgba(96, 165, 250, 0.14);
          --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:

          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 48px 20px;
      }
      .container {
        max-width: 640px;
        width: 100%;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        margin: 0 0 6px;
      }
      .sub {

        color: var(--text-dim);
        margin: 0 0 36px;
      }
      .list {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      a.card {
        display: block;
        padding: 20px 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        text-decoration: none;
        color: inherit;
        box-shadow: var(--shadow);
        transition: all 0.15s ease;
      }
      a.card:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .card-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 6px;
      }
      .card-desc {
        font-size: 13.5px;
        color: var(--text-dim);
        line-height: 1.65;
      }
      .card-badge {
        display: inline-block;
        margin-top: 10px;
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        font-size: 11.5px;
        color: var(--text-dim);
        font-weight: 500;
      }
      footer {
        margin-top: 48px;
        font-size: 12px;
        color: var(--text-dim);
        text-align: center;
      }
